<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Zalith 主页编辑器 - 可视化制作你的启动器主页</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://fastly.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<div class="app">
    <!-- 顶部栏 -->
    <div class="top-bar">
        <div class="logo-area">
            <span class="logo">📄</span>
            <span class="title">Zalith 主页编辑器</span>
            <span class="badge">可视化</span>
        </div>
        <div class="tool-buttons">
            <button id="authorBtn" class="btn-icon">👤 关于作者</button>
            <button id="editBtn" class="btn-icon">✏️ 编辑</button>
            <button id="downloadBtn" class="btn-icon">💾 下载</button>
            <button id="uploadBtn" class="btn-icon">📁 上传</button>
            <button id="newBtn" class="btn-icon">✨ 新建</button>
            <button id="refreshBtn" class="btn-icon">🔄 刷新</button>
        </div>
    </div>

    <!-- 主区域 -->
    <div class="main-area">
        <!-- 左侧预览 -->
        <div class="preview-panel">
            <div class="panel-header">
                <span>👁️ 预览效果</span>
                <span id="fileName" class="file-name">未加载</span>
            </div>
            <div id="preview" class="preview-body">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <!-- 右侧编辑区（编辑模式显示） -->
        <div id="editPanel" class="edit-panel" style="display: none;">
            <div class="panel-header">
                <span>✏️ 源码编辑</span>
                <div class="panel-actions">
                    <button id="saveBtn" class="btn-small">💾 保存</button>
                    <button id="cancelBtn" class="btn-small">❌ 取消</button>
                </div>
            </div>
            
            <!-- 可视化组件栏 -->
            <div class="component-bar">
                <div class="bar-title">📦 插入组件</div>
                <div class="component-list" id="componentList">
                    <!-- 组件按钮会由 JS 动态生成 -->
                </div>
            </div>
            
            <!-- 代码编辑器 -->
            <textarea id="editor" class="editor" placeholder="在这里编写 Markdown 源码..."></textarea>
            
            <div class="editor-hint">
                💡 提示：点击上方按钮可快速插入组件，无需记忆语法
            </div>
        </div>
    </div>

    <!-- 提示消息 -->
    <div id="toast" class="toast"></div>
</div>

<!-- 组件配置弹窗 -->
<div id="modal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <span id="modalTitle">配置组件</span>
            <button id="modalClose" class="modal-close">×</button>
        </div>
        <div id="modalBody" class="modal-body"></div>
        <div class="modal-footer">
            <button id="modalCancel" class="btn-secondary">取消</button>
            <button id="modalConfirm" class="btn-primary">插入</button>
        </div>
    </div>
</div>

<!-- 帮助弹窗 -->
<div id="helpModal" class="modal" style="display: none;">
    <div class="modal-content modal-large">
        <div class="modal-header">
            <span>📖 组件语法速查</span>
            <button id="helpClose" class="modal-close">×</button>
        </div>
        <div id="helpBody" class="modal-body help-body"></div>
        <div class="modal-footer">
            <button id="helpConfirm" class="btn-primary">知道了</button>
        </div>
    </div>
</div>

<script src="js/ui.js"></script>
<script src="js/renderer.js"></script>
<script src="js/components.js"></script>
<script src="js/fileHandler.js"></script>
<script src="js/main.js"></script>
</body>
</html>
