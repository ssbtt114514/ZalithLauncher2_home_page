<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Zalith 主页编辑器 - 拖拽式可视化编辑</title>
    <link rel="preconnect" href="https://fastly.jsdelivr.net">
    <link rel="dns-prefetch" href="https://fastly.jsdelivr.net">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://fastly.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- 拖拽排序库 -->
    <script src="https://fastly.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>
<body>
<div class="app">
    <!-- 主编辑区（预览 + 属性面板） -->
    <div class="main-editor-area">
        <!-- 左侧预览区 -->
        <div class="preview-panel">
            <div class="panel-header">
                <span>👁️ 预览效果</span>
                <span id="fileName" class="file-name">未加载</span>
            </div>
            <div id="preview" class="preview-content">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <!-- 右侧属性面板（选中元素时显示） -->
        <div id="propertyPanel" class="property-panel" style="display: none;">
            <div class="panel-header">
                <span>🎨 属性设置</span>
                <button id="closePropertyBtn" class="close-btn">×</button>
            </div>
            <div id="propertyContent" class="property-content">
                <!-- 动态表单会插入这里 -->
            </div>
        </div>
    </div>

    <!-- 底部菜单栏（预览、新建、下载） -->
    <div class="bottom-menu">
        <div class="menu-left">
            <button id="previewModeBtn" class="menu-btn active">👁️ 预览模式</button>
            <button id="editModeBtn" class="menu-btn">✏️ 编辑模式</button>
        </div>
        <div class="menu-center">
            <span class="mode-indicator" id="modeIndicator">预览模式</span>
        </div>
        <div class="menu-right">
            <button id="newFileBtn" class="menu-btn">✨ 新建</button>
            <button id="uploadBtn" class="menu-btn">📁 上传</button>
            <button id="downloadBtn" class="menu-btn">💾 下载</button>
            <button id="refreshBtn" class="menu-btn">🔄 刷新</button>
            <button id="authorBtn" class="menu-btn author-btn">👤 关于作者</button>
        </div>
    </div>
</div>

<!-- 消息提示 -->
<div id="toast" class="toast"></div>

<!-- 组件配置弹窗（用于插入新组件） -->
<div id="modal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <span id="modalTitle">配置组件</span>
            <button id="modalClose" class="modal-close">×</button>
        </div>
        <div id="modalBody" class="modal-body"></div>
        <div class="modal-footer">
            <button id="modalCancel" class="btn-secondary">取消</button>
            <button id="modalConfirm" class="btn-primary">插入</button>
        </div>
    </div>
</div>

<!-- 帮助弹窗 -->
<div id="helpModal" class="modal" style="display: none;">
    <div class="modal-content modal-large">
        <div class="modal-header">
            <span>📖 组件语法速查</span>
            <button id="helpClose" class="modal-close">×</button>
        </div>
        <div id="helpBody" class="modal-body help-body"></div>
        <div class="modal-footer">
            <button id="helpConfirm" class="btn-primary">知道了</button>
        </div>
    </div>
</div>

<script src="js/renderer.js"></script>
<script src="js/components.js"></script>
<script src="js/fileHandler.js"></script>
<script src="js/dragEditor.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
